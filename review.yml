aid: attio-com
name: Attio
review:
  question: Does Attio expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Attio's own public API surface is a
    request/response REST API over HTTPS (base https://api.attio.com/v2). Its
    only server-push mechanism is outbound webhooks - HMAC-SHA256-signed HTTP
    POST callbacks delivered to a subscriber's target URL when data changes.
    There is no WebSocket (ws:// or wss://) and no Server-Sent Events (SSE)
    transport on Attio's API to model, so no AsyncAPI spec was created. The
    webhook delivery is documented in the RateLimits and review notes rather
    than as an AsyncAPI channel.
findings:
  summary: |
    Attio does not publish a documented public WebSocket API. Attio is an
    AI-native CRM built on an object/attribute/record data model. Its developer
    platform exposes a REST API at https://api.attio.com/v2, authenticated with
    a Bearer access token (API key or OAuth 2.0) and scoped by granular
    permissions. All documented endpoints - objects, records, attributes, lists,
    list entries, notes, tasks, comments, threads, webhooks, workspace members,
    meetings, files, and self/meta - are request/response REST over HTTPS. The
    only push mechanism Attio documents is webhooks: the platform delivers
    real-time HTTP POST requests to a chosen target URL when subscribed events
    occur (for example list-entry.created, note.created, record changes). Each
    delivery carries an Attio-Signature (also X-Attio-Signature) header that is a
    SHA-256 HMAC of the request body signed with the webhook secret, plus an
    Idempotency-Key header; delivery is at-least-once with a 5-second timeout.
    No realtime, bidirectional, or streaming WebSocket (ws:// or wss://) endpoint
    is documented anywhere in Attio's API reference.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.attio.com/v2
      documented: true
      note: The entire Attio public API is request/response REST over HTTPS with Bearer authentication.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Outbound HTTP POST callbacks to a subscriber target URL on subscribed
        events. HMAC-SHA256 signed (Attio-Signature / X-Attio-Signature),
        at-least-once delivery with an Idempotency-Key header and a 5-second
        timeout. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Attio's API reference, webhooks guide, or developer platform pages as of the review date.
