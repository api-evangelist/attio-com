  webhookMechanism:
    delivery: HTTP POST to subscriber target URL (HTTPS required)
    signing: SHA-256 HMAC of the request body using the webhook secret, sent in the Attio-Signature (and X-Attio-Signature) header
    deliveryGuarantee: at-least-once, with an Idempotency-Key header for deduplication
    timeout: 5 seconds per delivery attempt
    rateLimit: up to 25 requests per second per target URL (raisable via support)
    sampleEvents:
      - list-entry.created
      - list-entry.updated
      - list-entry.deleted
      - note.created
      - record.created
sources:
  - url: https://docs.attio.com/
    type: Documentation
    note: Attio developer docs. REST base URL https://api.attio.com/v2; no WebSocket transport mentioned.
  - url: https://docs.attio.com/rest-api/endpoint-reference/records/list-records
    type: APIReference
    note: Confirmed records query endpoint POST /v2/objects/{object}/records/query with record_permission:read and object_configuration:read scopes.
  - url: https://docs.attio.com/rest-api/guides/webhooks
    type: Documentation
    note: Webhooks deliver signed (Attio-Signature, SHA-256 HMAC) HTTP POSTs to a target URL; at-least-once with Idempotency-Key and a 5-second timeout. No WebSocket.
  - url: https://docs.attio.com/rest-api/how-to/rate-limiting
    type: Documentation
    note: 100 read requests/sec and 25 write requests/sec per token; HTTP 429 when exceeded. Webhook delivery capped at 25/sec per URL.
  - url: https://attio.com/platform/developers
    type: Documentation
    note: Developer platform overview - REST API, webhooks, and App SDK; no WebSocket API.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Attio's own public API is
    request/response REST (https://api.attio.com/v2), and its only server-push
    mechanism is outbound signed HTTP webhooks. No AsyncAPI document was created
    because there is no WebSocket or SSE transport on Attio's API to model; the
    webhook mechanism is documented in this review and in the RateLimits file.
