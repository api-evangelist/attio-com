aid: attio-com
url: https://raw.githubusercontent.com/api-evangelist/attio-com/refs/heads/main/apis.yml
name: Attio
kind: company
description: Attio is an AI-native customer relationship management (CRM) platform built
  on a flexible object/attribute/record data model. The Attio REST API (base
  https://api.attio.com/v2) exposes that data model programmatically - objects, records,
  attributes, lists, list entries, notes, tasks, comments, threads, workspace members,
  and webhooks - letting teams sync data, build workflows, and extend the CRM.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- CRM
- Customer Relationship Management
- AI
- Sales
- Data Model
- Objects and Records
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
