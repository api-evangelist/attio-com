    type: OpenAPI
  - url: collections/attio-com.postman_collection.json
    type: PostmanCollection
  - url: collections/attio-com.opencollection.json
    type: OpenCollection
  description: List, create, get, and update the objects (people, companies, deals,
    users, workspaces, and custom objects) that define the schema of an Attio
    workspace. Objects are the top-level model that records and attributes hang off of.
- aid: attio-com:attio-com-records-api
  name: Attio Records API
  tags:
