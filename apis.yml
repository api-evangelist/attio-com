  - url: collections/attio-com.postman_collection.json
    type: PostmanCollection
  - url: collections/attio-com.opencollection.json
    type: OpenCollection
  description: Full lifecycle for records within any object - query (list with filter
    and sort), create, get, update (append or overwrite multiselect values), delete,
    and assert/upsert by a matching attribute. Also lists a record's attribute value
    history and the list entries a record belongs to.
