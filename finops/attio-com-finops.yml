description: >-
  FinOps view of Attio spend. Attio is a per-seat SaaS CRM: cost is driven by the
  number of licensed workspace members multiplied by the plan's per-seat price
  (Free, Plus, Pro, or Enterprise), billed annually on paid tiers. The REST API
  is included with the workspace plan and is not billed per call, so API spend is
  not a separate metered line item - it is governed by rate limits rather than
  usage charges. The primary cost levers are seat count, seat tier, and right-
  sizing the number of active members.
notes: >-
  Per-seat rates are not reconciled here beyond publicly reported figures
  (roughly $29 and $69 per user per month, billed annually, for Plus and Pro;
  Enterprise is custom). Because API access carries no incremental fee, FinOps
  attention focuses on seat allocation and tier selection rather than call
  volume. Verify current prices on the Attio pricing page.
