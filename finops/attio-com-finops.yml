principles:
- name: Visibility
  description: Track licensed seats per workspace and plan tier; API usage carries no incremental charge, so monitor seats rather than call volume.
- name: Allocation
  description: Map seats to teams or cost centers so per-seat spend attributes to the group using the CRM.
- name: Optimization
  description: Right-size seat count by reclaiming inactive members and choose the lowest tier that still delivers required features; avoid over-provisioning Pro seats for read-only users.
- name: Accountability
  description: Assign an owner for the Attio subscription; review seat count and tier against actual active usage each renewal cycle.
